<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valerius - Main Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .login-container {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .logo-container {
            position: absolute;
            top: 10px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            color: white;
            font-size: 18px;
            font-weight: 600;
            opacity: 0.9;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            overflow: hidden;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            position: absolute;
            top: 20px;
            right: 30px;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .main-content {
            padding: 20px 100px 100px 100px;
            min-height: 800px;
            background: white;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
            text-align: center;
        }

        .page-subtitle {
            font-size: 18px;
            color: #6c757d;
            margin-bottom: 40px;
            text-align: center;
        }

        .market-data {
            display: flex;
            flex-direction: column;
            gap: 40px;
            margin-top: 0px;
        }
        
        .market-row {
            display: flex;
            gap: 20px;
            justify-content: space-evenly;
            align-items: stretch;
        }
        
        .top-row {
            justify-content: space-between;
        }
        
        .bottom-row {
            justify-content: space-between;
        }
        
        .market-card {
            background: white;
            border-radius: 12px;
            padding: 6px 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s;
            flex: 1;
            min-width: 85px;
            max-width: 95px;
        }
        
        .top-row .market-card {
            flex: 1;
            max-width: none;
        }
        
        .bottom-row .market-card {
            flex: 1;
            max-width: none;
        }
        
        @media (max-width: 1200px) {
            .market-row {
                flex-wrap: wrap;
                justify-content: center;
            }
            .market-card {
                flex: 0 0 auto;
                width: 200px;
            }
        }
        
        @media (max-width: 900px) {
            .market-row {
                flex-wrap: wrap;
            }
            .market-card {
                width: 180px;
            }
        }
        
        @media (max-width: 600px) {
            .market-row {
                flex-direction: column;
                align-items: center;
            }
            .market-card {
                width: 100%;
                max-width: 300px;
            }
        }

        .market-card:hover {
            transform: translateY(-2px);
        }

        .market-name {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 2px;
            font-weight: 600;
        }

        .market-price {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 1px;
        }

        .market-change {
            font-size: 14px;
            font-weight: 600;
        }

        .market-change.positive {
            color: #28a745;
        }

        .market-change.negative {
            color: #dc3545;
        }

        .market-loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .footer-text {
            position: relative;
            float: right;
            margin-top: 10px;
            font-size: 16px;
            color: #6c757d;
            font-style: italic;
            clear: both;
        }

        .technical-indicators-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
            margin-top: 20px;
            float: right;
            clear: both;
            text-decoration: none;
            display: inline-block;
        }

        .technical-indicators-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .technical-indicators-btn:active {
            transform: translateY(0);
        }

        .feature2-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
            margin-top: 10px;
            float: right;
            clear: both;
            text-decoration: none;
            display: inline-block;
        }

        .feature2-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .feature2-btn:active {
            transform: translateY(0);
        }

        .feature3-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
            margin-top: 10px;
            float: right;
            clear: both;
            text-decoration: none;
            display: inline-block;
        }

        .feature3-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .feature3-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <div class="logo">
                    <img src="/static/logo.png" alt="Company Logo">
                </div>
                <span class="logo-text">Valerius - Value Analytics Made Simple</span>
            </div>
            <a href="/" class="back-btn">Logout</a>
        </header>

        <main class="main-content">
            <h1 class="page-title">My Dashboard</h1>
            <p class="page-subtitle">Complete analytics and trading platform</p>

            <div id="marketDataContainer" class="market-loading">
                <p>Loading market data...</p>
            </div>
            <div class="footer-text">
                Hello world! 🐍☕
            </div>
            <a href="/technical_indicators" class="technical-indicators-btn">
                Technical Indicators
            </a>
            <a href="/feature2" class="feature2-btn">
                Feature 2
            </a>
            <a href="/feature3" class="feature3-btn">
                Feature 3
            </a>
        </main>
    </div>

    <script>
        // Market data functionality
        async function loadMarketData() {
            try {
                const response = await fetch('/api/market-data');
                const responseData = await response.json();
                
                if (responseData.error) {
                    throw new Error(responseData.error);
                }
                
                const container = document.getElementById('marketDataContainer');
                container.className = 'market-data';
                
                // Create two rows - first 5 indices in top row, last 6 in bottom row
                const topRowIndices = ['S&P 500', 'NASDAQ', 'Dow Jones', '10Y Treasury', 'Crude Oil'];
                const bottomRowIndices = ['Nikkei 225', 'Hang Seng', 'ASX 200', 'CAC 40', 'FTSE 100', 'DAX'];
                
                let html = '<div class="market-row top-row">';
                
                // Top row (5 items)
                topRowIndices.forEach(name => {
                    const data = Object.entries(responseData.data).find(([key, value]) => value.name === name);
                    if (data) {
                        html += createMarketCard(data[1]);
                    }
                });
                
                html += '</div><div class="market-row bottom-row">';
                
                // Bottom row (6 items)
                bottomRowIndices.forEach(name => {
                    const data = Object.entries(responseData.data).find(([key, value]) => value.name === name);
                    if (data) {
                        html += createMarketCard(data[1]);
                    }
                });
                
                html += '</div>';
                
                container.innerHTML = html;
                
            } catch (error) {
                const container = document.getElementById('marketDataContainer');
                container.innerHTML = `<p>Error loading market data: ${error.message}</p>`;
            }
        }
        
        // Helper function to create market card HTML
        function createMarketCard(info) {
            const changeClass = info.change >= 0 ? 'positive' : 'negative';
            const changeSymbol = info.change >= 0 ? '+' : '';
            
            let priceDisplay = info.price;
            if (info.price === 'N/A') {
                priceDisplay = 'N/A';
            } else if (info.price === 'Error') {
                priceDisplay = 'Error';
            } else {
                priceDisplay = `$${parseFloat(info.price).toLocaleString()}`;
            }
            
            let changeDisplay = '';
            if (info.price === 'N/A' || info.price === 'Error') {
                changeDisplay = 'No data';
            } else {
                changeDisplay = `${changeSymbol}${info.change.toFixed(2)} (${changeSymbol}${info.change_percent.toFixed(2)}%)`;
            }
            
            return `
                <div class="market-card">
                    <div class="market-name">${info.name}</div>
                    <div class="market-price">${priceDisplay}</div>
                    <div class="market-change ${info.price === 'N/A' || info.price === 'Error' ? '' : changeClass}">
                        ${changeDisplay}
                    </div>
                </div>
            `;
        }

        // Load market data when page loads
        window.addEventListener('load', loadMarketData);
        
        // Refresh market data every 60 seconds
        setInterval(loadMarketData, 60000);
    </script>
</body>
</html>
