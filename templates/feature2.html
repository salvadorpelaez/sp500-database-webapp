<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature 2 - Valerious</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .main-content {
            background: white;
            border-radius: 12px;
            padding: 20px 100px 100px 100px;
            min-height: 800px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .page-subtitle {
            font-size: 16px;
            color: #6c757d;
            margin-bottom: 30px;
        }

        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .indicator-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s ease;
        }

        .indicator-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .indicator-name {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .indicator-description {
            font-size: 14px;
            color: #6c757d;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .indicator-formula {
            background: white;
            padding: 10px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #495057;
            border: 1px solid #dee2e6;
        }

        .footer-text {
            position: relative;
            float: right;
            margin-top: 10px;
            font-size: 16px;
            color: #6c757d;
            font-style: italic;
            clear: both;
        }

        .stock-selection {
            margin: 40px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }

        .stock-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 16px;
        }

        .stock-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            margin-bottom: 5px;
            transition: border-color 0.3s ease;
        }

        .stock-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .stock-suggestions {
            position: relative;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            background: white;
            margin-bottom: 15px;
            display: none;
            z-index: 1000;
        }

        .stock-suggestion {
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f8f9fa;
            transition: background-color 0.2s ease;
        }

        .stock-suggestion:hover {
            background-color: #f8f9fa;
        }

        .stock-suggestion:last-child {
            border-bottom: none;
        }

        .stock-suggestion.selected {
            background-color: #667eea;
            color: white;
        }

        .suggestion-ticker {
            font-weight: 600;
            color: #2c3e50;
        }

        .suggestion-name {
            font-size: 12px;
            color: #6c757d;
            margin-left: 8px;
        }

        .suggestion-exchange {
            font-size: 11px;
            color: #28a745;
            margin-left: 8px;
            padding: 2px 6px;
            background: #f8f9fa;
            border-radius: 3px;
        }

        .add-stock-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-stock-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .add-stock-btn:active {
            transform: translateY(0);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .search-stock-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-stock-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .search-stock-btn:active {
            transform: translateY(0);
        }

        .clear-results-btn {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .clear-results-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        .clear-results-btn:active {
            transform: translateY(0);
        }

        .search-results {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #dee2e6;
        }

        .search-results h3 {
            margin-bottom: 20px;
            color: #2c3e50;
            font-size: 20px;
        }

        .search-results-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .stock-tile {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #dee2e6;
            transition: all 0.3s ease;
        }

        .stock-tile:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .stock-tile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stock-ticker {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
        }

        .stock-exchange {
            font-size: 12px;
            color: #6c757d;
            background: #f8f9fa;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .stock-name {
            font-size: 14px;
            color: #495057;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .stock-price {
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .stock-change {
            font-size: 14px;
            font-weight: 600;
        }

        .stock-change.positive {
            color: #28a745;
        }

        .stock-change.negative {
            color: #dc3545;
        }

        .loading-tile {
            text-align: center;
            padding: 20px;
            color: #6c757d;
        }

        .error-tile {
            background: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }

        .current-portfolio {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #dee2e6;
        }

        .current-portfolio h3 {
            margin-bottom: 10px;
            color: #2c3e50;
            font-size: 20px;
        }

        .portfolio-count {
            margin-bottom: 20px;
            color: #6c757d;
            font-size: 14px;
        }

        .portfolio-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .portfolio-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #dee2e6;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .portfolio-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .portfolio-item.deletable {
            border: 2px solid transparent;
        }

        .portfolio-item.deletable:hover {
            border-color: #dc3545;
        }

        .delete-hint {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #dc3545;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .portfolio-item:hover .delete-hint {
            opacity: 1;
        }

        .empty-portfolio {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-style: italic;
        }

        .stock-tile.selectable {
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .stock-tile.selectable:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
        }

        .stock-tile.selectable:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stock-tile.adding {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border-color: #28a745;
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .portfolio-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
            z-index: 1000;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        }

        .portfolio-notification.show {
            opacity: 1;
            transform: translateX(0);
        }

        .coming-soon {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .coming-soon h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .coming-soon p {
            font-size: 16px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <div class="logo">V</div>
                <span class="logo-text">Valerius - Value Analytics Made Simple</span>
            </div>
            <a href="/main" class="back-btn">← Back to Dashboard</a>
        </header>

        <main class="main-content">
            <h1 class="page-title">Build/Update Your Portfolio</h1>
            <p class="page-subtitle">Advanced analytics and tools for enhanced market insights</p>

            <div class="stock-selection">
                <label for="stockInput" class="stock-label">Select stock name/stock ticker:</label>
                <input type="text" id="stockInput" class="stock-input" placeholder="Type stock name or ticker...">
                <div id="stockSuggestions" class="stock-suggestions"></div>
                <div class="button-group">
                    <button id="searchStockBtn" class="search-stock-btn">Search Stock</button>
                    <button id="clearResultsBtn" class="clear-results-btn">Clear Results</button>
                    <button id="addStockBtn" class="add-stock-btn">Add to Portfolio</button>
                </div>
            </div>

            <div id="searchResults" class="search-results" style="display: none;">
                <h3>Search Results</h3>
                <div id="searchResultsContainer" class="search-results-container"></div>
            </div>

            <div id="currentPortfolio" class="current-portfolio" style="display: none;">
                <h3>Current Portfolio</h3>
                <p id="portfolioCount" class="portfolio-count"></p>
                <div id="portfolioContainer" class="portfolio-container"></div>
            </div>

            <div class="footer-text">
                Hello world! 🐍☕
            </div>
        </main>
    </div>

    <div id="portfolioNotification" class="portfolio-notification"></div>

    <script>
        // Stock autocomplete functionality
        let allStocks = [];
        let selectedStock = null;

        // Load all stocks when page loads
        window.addEventListener('load', loadStocks);

        async function loadStocks() {
            try {
                const response = await fetch('/api/all-stocks');
                allStocks = await response.json();
                console.log('Loaded', allStocks.length, 'stocks');
            } catch (error) {
                console.error('Error loading stocks:', error);
            }
        }

        // Handle input in textbox
        document.getElementById('stockInput').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase().trim();
            const suggestionsDiv = document.getElementById('stockSuggestions');
            
            if (searchTerm.length < 2) {
                suggestionsDiv.style.display = 'none';
                selectedStock = null;
                return;
            }
            
            // Filter stocks based on search term
            const filteredStocks = allStocks.filter(stock => 
                stock.ticker.toLowerCase().includes(searchTerm) ||
                stock.name.toLowerCase().includes(searchTerm)
            );
            
            // Limit to top 10 results
            const limitedStocks = filteredStocks.slice(0, 10);
            
            if (limitedStocks.length > 0) {
                displaySuggestions(limitedStocks);
            } else {
                suggestionsDiv.style.display = 'none';
                selectedStock = null;
            }
        });

        function displaySuggestions(stocks) {
            const suggestionsDiv = document.getElementById('stockSuggestions');
            suggestionsDiv.innerHTML = '';
            
            stocks.forEach(stock => {
                const suggestionDiv = document.createElement('div');
                suggestionDiv.className = 'stock-suggestion';
                suggestionDiv.innerHTML = `
                    <span class="suggestion-ticker">${stock.ticker}</span>
                    <span class="suggestion-name">${stock.name}</span>
                    <span class="suggestion-exchange">${stock.exchange}</span>
                `;
                
                suggestionDiv.addEventListener('click', function() {
                    selectStock(stock);
                });
                
                suggestionsDiv.appendChild(suggestionDiv);
            });
            
            suggestionsDiv.style.display = 'block';
        }

        function selectStock(stock) {
            selectedStock = stock;
            document.getElementById('stockInput').value = `${stock.ticker} - ${stock.name}`;
            document.getElementById('stockSuggestions').style.display = 'none';
        }

        // Handle keyboard navigation
        document.getElementById('stockInput').addEventListener('keydown', function(e) {
            const suggestionsDiv = document.getElementById('stockSuggestions');
            const suggestions = suggestionsDiv.querySelectorAll('.stock-suggestion');
            
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                const selected = suggestionsDiv.querySelector('.selected');
                if (selected) {
                    selected.classList.remove('selected');
                    const next = selected.nextElementSibling;
                    if (next) {
                        next.classList.add('selected');
                        next.scrollIntoView({ block: 'nearest' });
                    }
                } else if (suggestions.length > 0) {
                    suggestions[0].classList.add('selected');
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                const selected = suggestionsDiv.querySelector('.selected');
                if (selected) {
                    selected.classList.remove('selected');
                    const prev = selected.previousElementSibling;
                    if (prev) {
                        prev.classList.add('selected');
                        prev.scrollIntoView({ block: 'nearest' });
                    }
                }
            } else if (e.key === 'Enter') {
                e.preventDefault();
                const selected = suggestionsDiv.querySelector('.selected');
                if (selected) {
                    selected.click();
                } else if (selectedStock) {
                    // If Enter pressed with selected stock, add to portfolio
                    addStockToPortfolio();
                }
            } else if (e.key === 'Escape') {
                suggestionsDiv.style.display = 'none';
                selectedStock = null;
            }
        });

        // Handle stock selection
        document.getElementById('addStockBtn').addEventListener('click', addStockToPortfolio);
        document.getElementById('searchStockBtn').addEventListener('click', searchStock);
        document.getElementById('clearResultsBtn').addEventListener('click', clearResults);

        function clearResults() {
            // Clear search input
            document.getElementById('stockInput').value = '';
            
            // Hide suggestions
            document.getElementById('stockSuggestions').style.display = 'none';
            
            // Hide search results section
            document.getElementById('searchResults').style.display = 'none';
            
            // Clear search results container
            document.getElementById('searchResultsContainer').innerHTML = '';
            
            // Clear global search results
            window.currentSearchResults = [];
            
            // Reset selected stock and search result
            selectedStock = null;
            selectedSearchResultIndex = null;
            
            // Remove any selected highlights
            const tiles = document.querySelectorAll('.stock-tile');
            tiles.forEach(tile => tile.classList.remove('selected'));
        }

        async function searchStock() {
            const searchTerm = document.getElementById('stockInput').value.trim();
            
            if (!searchTerm) {
                alert('Please enter a stock ticker or company name to search');
                return;
            }
            
            const searchResultsDiv = document.getElementById('searchResults');
            const searchResultsContainer = document.getElementById('searchResultsContainer');
            
            // Show search results section
            searchResultsDiv.style.display = 'block';
            
            // Show loading state
            searchResultsContainer.innerHTML = '<div class="loading-tile">Searching for stock...</div>';
            
            try {
                const response = await fetch(`/api/search-stock?query=${encodeURIComponent(searchTerm)}`);
                const data = await response.json();
                
                if (response.ok) {
                    displaySearchResults(data);
                } else {
                    throw new Error(data.error || 'Search failed');
                }
            } catch (error) {
                console.error('Search error:', error);
                searchResultsContainer.innerHTML = `
                    <div class="stock-tile error-tile">
                        <div class="stock-ticker">Error</div>
                        <div class="stock-name">${error.message}</div>
                    </div>
                `;
            }
        }

        // Track double-click timing
        let lastClickTime = 0;
        let clickTimeout = null;

        function handleTileClick(index, event) {
            const currentTime = Date.now();
            
            // Check for double-click (within 500ms)
            if (lastClickTime && (currentTime - lastClickTime < 500)) {
                // Double-click detected
                clearTimeout(clickTimeout);
                lastClickTime = 0;
                
                // Add to portfolio immediately
                addToPortfolio(index);
                return;
            }
            
            // Single-click - set timeout for potential double-click
            lastClickTime = currentTime;
            clickTimeout = setTimeout(() => {
                // If no second click within 500ms, add to portfolio
                addToPortfolio(index);
                lastClickTime = 0;
            }, 500);
            
            // Visual feedback
            const tile = document.querySelector(`[data-index="${index}"]`);
            if (tile) {
                tile.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    tile.style.transform = '';
                }, 150);
            }
        }

        async function displaySearchResults(results) {
            const searchResultsContainer = document.getElementById('searchResultsContainer');
            
            if (results.length === 0) {
                searchResultsContainer.innerHTML = '<div class="loading-tile">No results found</div>';
                return;
            }
            
            // Display results immediately without prices
            let html = '';
            results.forEach((stock, index) => {
                html += `
                    <div class="stock-tile selectable" onclick="handleTileClick(${index}, event)" data-index="${index}">
                        <div class="stock-tile-header">
                            <div class="stock-ticker">${stock.ticker}</div>
                            <div class="stock-exchange">${stock.exchange}</div>
                        </div>
                        <div class="stock-name">${stock.name}</div>
                        <div class="stock-price">Loading...</div>
                        <div class="stock-change">Loading...</div>
                    </div>
                `;
            });
            
            searchResultsContainer.innerHTML = html;
            
            // Store search results globally for access in addToPortfolio function
            window.currentSearchResults = results;
            
            // Fetch stock prices asynchronously
            fetchStockPrices(results);
        }

        async function fetchStockPrices(results) {
            const tickers = results.map(stock => stock.ticker).join(',');
            
            try {
                const response = await fetch(`/api/stock-prices?tickers=${encodeURIComponent(tickers)}`);
                const prices = await response.json();
                
                if (response.ok) {
                    // Update tiles with price information
                    results.forEach((stock, index) => {
                        const tile = document.querySelector(`[data-index="${index}"]`);
                        if (tile && prices[stock.ticker]) {
                            const priceData = prices[stock.ticker];
                            const changeClass = priceData.change >= 0 ? 'positive' : 'negative';
                            const changeSymbol = priceData.change >= 0 ? '+' : '';
                            
                            let priceDisplay = priceData.price;
                            if (priceData.price === 'N/A' || priceData.price === 'Error') {
                                priceDisplay = priceData.price;
                            } else {
                                priceDisplay = `$${parseFloat(priceData.price).toFixed(2)}`;
                            }
                            
                            let changeDisplay = '';
                            if (priceData.price === 'N/A' || priceData.price === 'Error') {
                                changeDisplay = 'No data';
                            } else {
                                changeDisplay = `${changeSymbol}${priceData.change.toFixed(2)} (${changeSymbol}${priceData.change_percent.toFixed(2)}%)`;
                            }
                            
                            tile.innerHTML = `
                                <div class="stock-tile-header">
                                    <div class="stock-ticker">${stock.ticker}</div>
                                    <div class="stock-exchange">${stock.exchange}</div>
                                </div>
                                <div class="stock-name">${stock.name}</div>
                                <div class="stock-price">${priceDisplay}</div>
                                <div class="stock-change ${priceData.price === 'N/A' || priceData.price === 'Error' ? '' : changeClass}">
                                    ${changeDisplay}
                                </div>
                            `;
                        }
                    });
                }
            } catch (error) {
                console.error('Error fetching stock prices:', error);
                // Keep "Loading..." state if price fetch fails
            }
        }

        async function addToPortfolio(index) {
            const stock = window.currentSearchResults[index];
            
            if (!stock) {
                console.error('Stock data not found');
                return;
            }
            
            try {
                // Add stock to portfolio via API
                const response = await fetch('/api/add-to-portfolio', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        ticker: stock.ticker,
                        name: stock.name,
                        exchange: stock.exchange,
                        price: stock.price,
                        change: stock.change,
                        change_percent: stock.change_percent
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // Show success notification
                    showPortfolioNotification(`${stock.name} has been added to your dashboard`);
                    
                    // Highlight the selected tile
                    const tiles = document.querySelectorAll('.stock-tile');
                    tiles.forEach(tile => tile.classList.remove('selected'));
                    tiles[index].classList.add('selected');
                } else {
                    throw new Error(result.error || 'Failed to add to portfolio');
                }
            } catch (error) {
                console.error('Error adding to portfolio:', error);
                showPortfolioNotification(`Error: ${error.message}`, 'error');
            }
        }

        function showPortfolioNotification(message, type = 'success') {
            const notification = document.getElementById('portfolioNotification');
            notification.textContent = message;
            
            if (type === 'error') {
                notification.style.background = 'linear-gradient(135deg, #dc3545 0%, #c82333 100%)';
            } else {
                notification.style.background = 'linear-gradient(135deg, #28a745 0%, #20c997 100%)';
            }
            
            notification.classList.add('show');
            
            // Hide notification after 3 seconds
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Track selected search result
        let selectedSearchResultIndex = null;

        function selectSearchResult(index) {
            // Remove previous selection
            const tiles = document.querySelectorAll('.stock-tile');
            tiles.forEach(tile => tile.classList.remove('selected'));
            
            // Add selection to clicked tile
            const selectedTile = document.querySelector(`[data-index="${index}"]`);
            if (selectedTile) {
                selectedTile.classList.add('selected');
                selectedSearchResultIndex = index;
            }
        }

        function addStockToPortfolio() {
            // Check if we have a selected search result
            if (selectedSearchResultIndex !== null && window.currentSearchResults && window.currentSearchResults[selectedSearchResultIndex]) {
                // Add the selected search result to portfolio
                addToPortfolio(selectedSearchResultIndex);
                return;
            }
            
            // Fallback to old autocomplete system
            if (!selectedStock) {
                // Try to find exact match from input
                const inputText = document.getElementById('stockInput').value.trim();
                if (inputText) {
                    // Extract ticker from input (first part before ' - ')
                    const ticker = inputText.split(' - ')[0].toUpperCase();
                    selectedStock = allStocks.find(s => s.ticker === ticker);
                }
            }
            
            if (!selectedStock) {
                alert('Please search for a stock and select it, or use the autocomplete suggestions');
                return;
            }
            
            // Show stock details
            alert(`Added to portfolio:\nTicker: ${selectedStock.ticker}\nName: ${selectedStock.name}\nExchange: ${selectedStock.exchange}\nSector: ${selectedStock.sector || 'N/A'}`);
            
            // Here you would typically add the stock to a portfolio
            console.log('Stock added to portfolio:', selectedStock);
            
            // Clear selection
            document.getElementById('stockInput').value = '';
            selectedStock = null;
        }

        // Hide suggestions when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.stock-selection')) {
                document.getElementById('stockSuggestions').style.display = 'none';
            }
        });

        // Load portfolio when page loads
        window.addEventListener('load', loadCurrentPortfolio);

        // Load portfolio after adding stock
        async function addToPortfolio(index) {
            const stock = window.currentSearchResults[index];
            
            if (!stock) {
                console.error('Stock data not found');
                return;
            }
            
            try {
                // Add stock to portfolio via API
                const response = await fetch('/api/add-to-portfolio', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        ticker: stock.ticker,
                        name: stock.name,
                        exchange: stock.exchange,
                        price: stock.price,
                        change: stock.change,
                        change_percent: stock.change_percent
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // Show success notification
                    showPortfolioNotification(`${stock.name} has been added to your dashboard`);
                    
                    // Highlight the selected tile
                    const tiles = document.querySelectorAll('.stock-tile');
                    tiles.forEach(tile => tile.classList.remove('selected'));
                    tiles[index].classList.add('selected');
                    
                    // Reload portfolio display
                    await loadCurrentPortfolio();
                } else {
                    throw new Error(result.error || 'Failed to add to portfolio');
                }
            } catch (error) {
                console.error('Error adding to portfolio:', error);
                showPortfolioNotification(`Error: ${error.message}`, 'error');
            }
        }

        // Load current portfolio
        async function loadCurrentPortfolio() {
            try {
                const response = await fetch('/api/get-portfolio');
                const data = await response.json();
                
                if (response.ok) {
                    displayCurrentPortfolio(data.portfolio);
                } else {
                    throw new Error(data.error || 'Failed to load portfolio');
                }
            } catch (error) {
                console.error('Error loading portfolio:', error);
            }
        }

        // Display current portfolio
        function displayCurrentPortfolio(portfolio) {
            const portfolioSection = document.getElementById('currentPortfolio');
            const portfolioContainer = document.getElementById('portfolioContainer');
            const portfolioCount = document.getElementById('portfolioCount');
            
            if (!portfolio || portfolio.length === 0) {
                portfolioSection.style.display = 'none';
                return;
            }
            
            portfolioSection.style.display = 'block';
            portfolioCount.textContent = `You have ${portfolio.length} stock${portfolio.length === 1 ? '' : 's'} in your portfolio`;
            
            let html = '';
            portfolio.forEach(stock => {
                const changeClass = stock.change >= 0 ? 'positive' : 'negative';
                const changeSymbol = stock.change >= 0 ? '+' : '';
                
                let priceDisplay = stock.price;
                if (stock.price === 'N/A' || stock.price === 'Error') {
                    priceDisplay = stock.price;
                } else {
                    priceDisplay = `$${parseFloat(stock.price).toFixed(2)}`;
                }
                
                let changeDisplay = '';
                if (stock.price === 'N/A' || stock.price === 'Error') {
                    changeDisplay = 'No data';
                } else {
                    changeDisplay = `${changeSymbol}${stock.change.toFixed(2)} (${changeSymbol}${stock.change_percent.toFixed(2)}%)`;
                }
                
                html += `
                    <div class="portfolio-item deletable" 
                         oncontextmenu="removeFromPortfolio('${stock.ticker}', event)"
                         onclick="viewStockGraph('${stock.ticker}', '${stock.name.replace(/'/g, "\\'")}', '${stock.exchange}')">
                        <div class="delete-hint">Right-click to remove</div>
                        <div class="stock-tile-header">
                            <div class="stock-ticker">${stock.ticker}</div>
                            <div class="stock-exchange">${stock.exchange}</div>
                        </div>
                        <div class="stock-name">${stock.name}</div>
                        <div class="stock-price">${priceDisplay}</div>
                        <div class="stock-change ${stock.price === 'N/A' || stock.price === 'Error' ? '' : changeClass}">
                            ${changeDisplay}
                        </div>
                    </div>
                `;
            });
            
            portfolioContainer.innerHTML = html;
        }

        // Remove stock from portfolio
        async function removeFromPortfolio(ticker, event) {
            event.preventDefault(); // Prevent context menu
            
            if (!confirm(`Remove ${ticker} from your portfolio?`)) {
                return;
            }
            
            try {
                const response = await fetch('/api/remove-from-portfolio', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ ticker: ticker })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showPortfolioNotification(`${ticker} has been removed from your dashboard`);
                    await loadCurrentPortfolio();
                } else {
                    throw new Error(result.error || 'Failed to remove from portfolio');
                }
            } catch (error) {
                console.error('Error removing from portfolio:', error);
                showPortfolioNotification(`Error: ${error.message}`, 'error');
            }
        }

        // View stock graph (reuse function from main page)
        function viewStockGraph(ticker, name, exchange) {
            window.location.href = `/stock-graph?ticker=${encodeURIComponent(ticker)}&name=${encodeURIComponent(name)}&exchange=${encodeURIComponent(exchange)}`;
        }
    </script>
</body>
</html>
