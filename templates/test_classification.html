<!DOCTYPE html>
<html>
<head>
    <title>Test Classification Display</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Test Classification Display</h1>
    <table id="testTable">
        <thead>
            <tr>
                <th>Ticker</th>
                <th>Name</th>
                <th>Classification</th>
            </tr>
        </thead>
        <tbody id="testBody">
        </tbody>
    </table>

    <script>
        async function testData() {
            try {
                const response = await fetch('/api/companies');
                const data = await response.json();
                
                const testBody = document.getElementById('testBody');
                testBody.innerHTML = '';
                
                // Show first 20 companies
                const companies = data.companies.slice(0, 20);
                
                companies.forEach(company => {
                    const row = document.createElement('tr');
                    
                    const tdTicker = document.createElement('td');
                    tdTicker.textContent = company.ticker;
                    row.appendChild(tdTicker);
                    
                    const tdName = document.createElement('td');
                    tdName.textContent = company.name;
                    row.appendChild(tdName);
                    
                    const tdClassification = document.createElement('td');
                    tdClassification.textContent = company.classification || 'EMPTY';
                    tdClassification.style.backgroundColor = company.classification ? '#ffffcc' : '#ffcccc';
                    row.appendChild(tdClassification);
                    
                    testBody.appendChild(row);
                });
                
                console.log('Test data loaded');
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        testData();
    </script>
</body>
</html>
